<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯繫紀錄表</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
  #lock-screen{position:fixed;inset:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:999}
  .lock-box{background:#242424;border-radius:16px;padding:2.5rem 2rem;width:min(320px,90vw);text-align:center}
  .lock-box h2{color:#fff;font-size:16px;font-weight:500;margin-bottom:6px;letter-spacing:0.05em}
  .lock-box p{color:#666;font-size:12px;margin-bottom:1.5rem}
  .lock-box input{width:100%;height:44px;padding:0 14px;border-radius:8px;border:1px solid #3a3a3a;background:#2e2e2e;color:#fff;font-size:16px;text-align:center;letter-spacing:0.15em;outline:none;font-family:inherit}
  .lock-box input:focus{border-color:#666}
  .lock-box button{width:100%;height:44px;margin-top:10px;border-radius:8px;border:none;background:#fff;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  .lock-box button:hover{background:#eee}
  .lock-error{color:#e05c5c;font-size:12px;margin-top:10px;min-height:18px}
  #main-content{display:none}
  header{background:#1a1a1a;color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  header h1{font-size:16px;font-weight:500;letter-spacing:0.05em}
  header .sub{font-size:12px;color:#888;margin-top:2px}
  .stats{display:flex;gap:8px;flex-wrap:wrap}
  .stat{background:#2a2a2a;border-radius:8px;padding:6px 14px;text-align:center}
  .stat .n{font-size:20px;font-weight:500;line-height:1.2}
  .stat .l{font-size:10px;color:#888;margin-top:1px}
  .stat.s-replied .n{color:#6db96d}
  .stat.s-pending .n{color:#e8a84a}
  .stat.s-urgent .n{color:#e05c5c}
  .stat.s-waiting .n{color:#5b9bd5}
  .toolbar{padding:1rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e8e5df}
  .toolbar input,.toolbar select{height:36px;padding:0 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
  .toolbar input{flex:1;min-width:180px}
  .toolbar input:focus,.toolbar select:focus{border-color:#1a1a1a}
  .btn{height:36px;padding:0 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;border:1px solid #ddd;background:#fff;color:#1a1a1a}
  .btn:hover{background:#f5f4f0}
  .btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .btn-dark:hover{background:#333}
  .tbl-wrap{overflow-x:auto;margin:1rem 1.5rem;border-radius:10px;border:1px solid #e8e5df;background:#fff}
  table{width:100%;border-collapse:collapse;min-width:900px}
  th{background:#f5f4f0;font-weight:500;font-size:11px;color:#888;padding:10px 12px;text-align:left;border-bottom:1px solid #e8e5df;white-space:nowrap;letter-spacing:0.03em}
  td{padding:10px 12px;border-bottom:1px solid #f0ede8;vertical-align:top;font-size:13px}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#faf9f7}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
  .b-replied{background:#e8f5e8;color:#2d7a2d}
  .b-pending{background:#fef3e2;color:#a06010}
  .b-waiting{background:#e3edf8;color:#1a5fa0}
  .b-urgent{background:#fde8e8;color:#a02020}
  .type-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#f0ede8;color:#666}
  .desc-cell{max-width:220px;word-break:break-all;line-height:1.6}
  .act-btn{background:none;border:none;cursor:pointer;color:#bbb;padding:3px 5px;border-radius:5px;font-size:13px;line-height:1}
  .act-btn:hover{color:#1a1a1a;background:#f0ede8}
  .empty{text-align:center;padding:3rem;color:#aaa;font-size:13px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(580px,95vw);max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
  .modal h3{font-size:15px;font-weight:500;margin-bottom:1.2rem}
  .form-row{margin-bottom:12px}
  .form-row label{display:block;font-size:11px;color:#888;margin-bottom:4px;letter-spacing:0.03em}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#1a1a1a}
  .form-row textarea{resize:vertical;min-height:64px;line-height:1.6}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid #f0ede8}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:200;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:600px){.form-2col{grid-template-columns:1fr}.stats{gap:6px}.stat{padding:5px 10px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <h2>聯繫紀錄表</h2>
    <p>請輸入密碼以繼續</p>
    <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">進入</button>
    <div class="lock-error" id="pw-error"></div>
  </div>
</div>

<div id="main-content">
<header>
  <div>
    <h1>聯繫紀錄表</h1>
    <div class="sub">業主溝通事項追蹤紀錄</div>
  </div>
  <div class="stats" id="stats"></div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="搜尋關鍵字..." oninput="render()">
  <select id="fStatus" onchange="render()">
    <option value="">全部狀態</option>
    <option value="replied">已回覆</option>
    <option value="pending">待回覆</option>
    <option value="waiting">等待中</option>
    <option value="urgent">緊急</option>
  </select>
  <select id="fType" onchange="render()">
    <option value="">全部類型</option>
    <option value="疑義紀錄">疑義紀錄</option>
    <option value="私訊聯絡">私訊聯絡</option>
    <option value="會議記錄">會議記錄</option>
    <option value="其他">其他</option>
  </select>
  <button class="btn" onclick="exportExcel()">↓ 匯出 Excel</button>
  <button class="btn btn-dark" onclick="openModal()">＋ 新增記錄</button>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>提送日期</th>
      <th>類型</th>
      <th>釋疑概述</th>
      <th>回覆日期</th>
      <th>回覆概述</th>
      <th>提送人員</th>
      <th>狀態</th>
      <th>備註</th>
      <th></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal-bg" id="modalBg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">新增溝通記錄</h3>
    <div class="form-2col">
      <div class="form-row"><label>提送日期</label><input type="date" id="fDate"></div>
      <div class="form-row"><label>類型</label>
        <select id="fTypeInput">
          <option value="疑義紀錄">疑義紀錄</option>
          <option value="私訊聯絡">私訊聯絡</option>
          <option value="會議記錄">會議記錄</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>釋疑概述</label><textarea id="fDesc" placeholder="說明疑義內容..."></textarea></div>
    <div class="form-2col">
      <div class="form-row"><label>回覆日期</label><input type="date" id="fReplyDate"></div>
      <div class="form-row"><label>提送人員</label><input type="text" id="fPerson" placeholder="姓名"></div>
    </div>
    <div class="form-row"><label>回覆概述</label><textarea id="fReply" placeholder="回覆內容..."></textarea></div>
    <div class="form-2col">
      <div class="form-row"><label>狀態</label>
        <select id="fStatusInput">
          <option value="replied">已回覆</option>
          <option value="pending">待回覆</option>
          <option value="waiting">等待中</option>
          <option value="urgent">緊急</option>
        </select>
      </div>
      <div class="form-row"><label>備註</label><input type="text" id="fNote" placeholder="補充說明..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-dark" onclick="saveRecord()">儲存</button>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const CORRECT_PW = 'wt940802';
const SESSION_KEY = 'contact_log_auth';
const STORAGE_KEY = 'peide_a_records';

function checkPw(){
  const val = document.getElementById('pw-input').value;
  if(val === CORRECT_PW){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('main-content').style.display='block';
    load();render();
  } else {
    document.getElementById('pw-error').textContent='密碼錯誤，請再試一次';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

if(sessionStorage.getItem(SESSION_KEY)==='1'){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('main-content').style.display='block';
}

const STATUS_MAP = {
  replied:{label:'已回覆',cls:'b-replied'},
  pending:{label:'待回覆',cls:'b-pending'},
  waiting:{label:'等待中',cls:'b-waiting'},
  urgent:{label:'緊急',cls:'b-urgent'}
};

let data = [];
let editId = null;

function load(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    data = saved ? JSON.parse(saved) : [];
  }catch(e){ data = []; }
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function nextId(){
  return data.length ? Math.max(...data.map(r=>r.id))+1 : 1;
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('fStatus').value;
  const tp = document.getElementById('fType').value;
  const rows = data.filter(r=>{
    if(st && r.status!==st) return false;
    if(tp && r.type!==tp) return false;
    if(q && !(r.desc+r.reply+r.person+r.note).toLowerCase().includes(q)) return false;
    return true;
  });
  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="9"><div class="empty">沒有符合的記錄</div></td></tr>';
    updateStats(); return;
  }
  tbody.innerHTML = rows.map(r=>{
    const s = STATUS_MAP[r.status]||STATUS_MAP.pending;
    const descHtml = (r.desc||'').replace(/\n/g,'<br>');
    const replyHtml = (r.reply||'').replace(/\n/g,'<br>');
    return '<tr>'
      +'<td style="white-space:nowrap">'+r.date+'</td>'
      +'<td><span class="type-tag">'+r.type+'</span></td>'
      +'<td class="desc-cell">'+descHtml+'</td>'
      +'<td style="white-space:nowrap">'+(r.replyDate||'—')+'</td>'
      +'<td class="desc-cell">'+(replyHtml||'—')+'</td>'
      +'<td style="white-space:nowrap">'+r.person+'</td>'
      +'<td><span class="badge '+s.cls+'">'+s.label+'</span></td>'
      +'<td class="desc-cell" style="color:#999;font-size:12px">'+(r.note||'—')+'</td>'
      +'<td style="white-space:nowrap">'
      +'<button class="act-btn" onclick="editRecord('+r.id+')" title="編輯">✏️</button>'
      +'<button class="act-btn" onclick="deleteRecord('+r.id+')" title="刪除">🗑</button>'
      +'</td></tr>';
  }).join('');
  updateStats();
}

function updateStats(){
  const total=data.length;
  const replied=data.filter(r=>r.status==='replied').length;
  const pending=data.filter(r=>r.status==='pending').length;
  const urgent=data.filter(r=>r.status==='urgent').length;
  const waiting=data.filter(r=>r.status==='waiting').length;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="n">'+total+'</div><div class="l">總計</div></div>'
    +'<div class="stat s-replied"><div class="n">'+replied+'</div><div class="l">已回覆</div></div>'
    +'<div class="stat s-pending"><div class="n">'+pending+'</div><div class="l">待回覆</div></div>'
    +'<div class="stat s-waiting"><div class="n">'+waiting+'</div><div class="l">等待中</div></div>'
    +'<div class="stat s-urgent"><div class="n">'+urgent+'</div><div class="l">緊急</div></div>';
}

function openModal(id){
  id = id || null;
  editId=id;
  document.getElementById('modalTitle').textContent = id?'編輯記錄':'新增溝通記錄';
  const r = id ? data.find(x=>x.id===id) : {date:'',type:'疑義紀錄',desc:'',replyDate:'',reply:'',person:'',status:'pending',note:''};
  document.getElementById('fDate').value=r.date||'';
  document.getElementById('fTypeInput').value=r.type||'疑義紀錄';
  document.getElementById('fDesc').value=r.desc||'';
  document.getElementById('fReplyDate').value=r.replyDate||'';
  document.getElementById('fReply').value=r.reply||'';
  document.getElementById('fPerson').value=r.person||'';
  document.getElementById('fStatusInput').value=r.status||'pending';
  document.getElementById('fNote').value=r.note||'';
  document.getElementById('modalBg').style.display='flex';
}

function closeModal(){document.getElementById('modalBg').style.display='none';}

function saveRecord(){
  const rec={
    id: editId || nextId(),
    date: document.getElementById('fDate').value,
    type: document.getElementById('fTypeInput').value,
    desc: document.getElementById('fDesc').value,
    replyDate: document.getElementById('fReplyDate').value,
    reply: document.getElementById('fReply').value,
    person: document.getElementById('fPerson').value,
    status: document.getElementById('fStatusInput').value,
    note: document.getElementById('fNote').value
  };
  if(!rec.date||!rec.desc){alert('請填寫提送日期與釋疑概述');return;}
  if(editId){const i=data.findIndex(x=>x.id===editId);data[i]=rec;}
  else data.unshift(rec);
  save(); closeModal(); render();
  showToast(editId?'已更新記錄':'已新增記錄');
}

function editRecord(id){openModal(id);}

function deleteRecord(id){
  if(confirm('確定刪除這筆記錄？')){
    data=data.filter(x=>x.id!==id);
    save();render();
    showToast('已刪除');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

if(sessionStorage.getItem(SESSION_KEY)==='1'){load();render();}

function exportExcel(){
  if(!data.length){alert('沒有資料可以匯出');return;}
  var sl={replied:'已回覆',pending:'待回覆',waiting:'等待中',urgent:'緊急'};
  var h=['提送日期','類型','釋疑概述','回覆日期','回覆概述','提送人員','狀態','備註'];
  var lines=[h.join(',')];
  data.forEach(function(r){
    var row=[r.date,r.type,r.desc,r.replyDate,r.reply,r.person,sl[r.status]||'',r.note];
    lines.push(row.map(function(v){
      v=String(v||'').replace(/\n/g,' ').replace(/"/g,'""');
      return '"'+v+'"';
    }).join(','));
  });
  var csv='\uFEFF'+lines.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='聯繫紀錄表.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('已匯出！用 Excel 開啟即可');
}

</script>
</body>
</html>
